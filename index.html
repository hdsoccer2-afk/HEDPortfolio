<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Davis — Industrial Design 2026</title>
<meta name="description" content="Hunter Davis ID. Industrial design portfolio. Ergonomics, material behavior, and manufacturing reality. SCAD BFA 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=Azeret+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          base: '#1A1C1B', deep: '#222524', surface: '#353837',
          bdr: '#4A4D4B', accent: '#D4A24C',
          t1: '#FAFAFA', t2: '#A0A5A3', t3: '#6B6660',
          cmfgray: '#7F807D', cmfmaroon: '#24050B', cmfteal: '#2E3532',
        },
        fontFamily: {
          serif: ['"Instrument Serif"', 'Times New Roman', 'serif'],
          sans: ['"DM Sans"', '-apple-system', 'sans-serif'],
          mono: ['"Azeret Mono"', '"Courier New"', 'monospace'],
        },
      }
    }
  }
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app"></div>

<script>
/* ============================================================
   ROUTER + SHARED COMPONENTS
   ============================================================ */

const ROUTES = {
  '/': 'home',
  '/ergodeck': 'ergodeck',
  '/thermowave': 'thermowave',
  '/welded-stool': 'weldedstool',
  '/about': 'about',
  '/resume': 'resume',
  '/kohler': 'kohler',
  '/skullcandy': 'skullcandy',
  '/cad-renders': 'cadrenders',
};

// GitHub Pages base path detection (works at / locally and /HEDPortfolio/ on Pages)
const BASE = (() => {
  const p = location.pathname;
  const m = p.match(/^\/[^/]+/);
  // If served from a project page (repo name in path), use it as base
  if (m && !ROUTES.hasOwnProperty(m[0]) && !m[0].endsWith('.html')) return m[0];
  return '';
})();

const VIEWS = {}; // view files register render functions here

const A = f => `${BASE}/assets/${f}`; // asset path helper

function routeFromPath() {
  let p = location.pathname;
  if (BASE && p.startsWith(BASE)) p = p.slice(BASE.length) || '/';
  if (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);
  if (p.endsWith('index.html')) p = '/';
  return ROUTES[p] || 'home';
}

function navigate(path) {
  history.pushState({}, '', BASE + path);
  render();
  window.scrollTo(0, 0);
}
window.addEventListener('popstate', render);

// Redirect payload from 404.html (GitHub Pages SPA deep links)
(function () {
  const q = new URLSearchParams(location.search);
  const r = q.get('r');
  if (r) history.replaceState({}, '', BASE + r);
})();

/* ---------- shared components ---------- */

const NAV_ITEMS = [
  { label: 'Work', view: 'home', path: '/' },
  { label: 'About', view: 'about', path: '/about' },
  { label: 'Resume', view: 'resume', path: '/resume' },
];

function TopNav(active) {
  const links = v => NAV_ITEMS.map(n =>
    `<a href="${BASE}${n.path}" data-nav="${n.path}" class="${(active === n.view || (n.view === 'home' && !['about','resume'].includes(active))) ? 'active' : ''}">${n.label}</a>`
  ).join('');
  return `
  <header class="site-header">
    <div class="header-row1">
      <div class="header-brand">
        <img class="hunter-monogram" src="${A('hd-logo.png')}" alt="Hunter Davis monogram" onerror="this.style.visibility='hidden'">
        <span class="header-brand-label">IND. DESIGN · '26</span>
      </div>
      <div class="header-title f-serif">Hunter Davis</div>
      <nav class="header-nav">${links()}</nav>
      <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">MENU</button>
    </div>
    <div class="header-row2">
      <span><span class="status-dot"></span>ACTIVE</span>
      <span>SCAD ID / '26</span>
    </div>
  </header>
  <div class="mobile-overlay" id="mobileOverlay">
    <button class="close-btn" aria-label="Close menu">✕</button>
    ${links()}
  </div>`;
}

function Footer() {
  return `
  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <div class="label">© 2026</div>
        <div class="value">HUNTER DAVIS</div>
      </div>
      <div>
        <div class="label">CONTACT</div>
        <div class="value">hunterdavis.uas@gmail.com<br>© 2025 to 2026 Hunter Davis. All Rights Reserved.</div>
      </div>
      <div>
        <div class="label">AVAILABILITY</div>
        <div class="value accent">AVAILABLE · SUMMER 2026</div>
      </div>
    </div>
  </footer>`;
}

function CaseStudyBack() {
  return `<div class="page"><a href="${BASE}/" data-nav="/" class="back-link">← INDEX</a></div>`;
}

function PageNav(nextLabel, nextPath) {
  return `
  <div class="page">
    <div class="page-nav reveal">
      <a href="${BASE}/" data-nav="/">← INDEX</a>
      <a href="${BASE}${nextPath}" data-nav="${nextPath}">NEXT · ${nextLabel} ↗</a>
    </div>
  </div>`;
}

function secLabel(num, label) {
  return `<div class="sec-label">§\u2009${num}\u2009·\u2009${label}</div>`;
}

// fig card: renders image with graceful placeholder fallback if asset missing
function figCard({ src, fig, desc, ctx = '', aspect = '16/9', overlayCaption = false, extraClass = '' }) {
  const cap = fig ? `${fig}\u2009·\u2009${desc}` : desc;
  const missing = src ? '' : ' missing';
  const media = `
    <div class="fig-media ${extraClass}${missing}" style="aspect-ratio:${aspect};">
      ${src ? `<img src="${A(src)}" alt="${desc || fig}" loading="lazy"
        onerror="this.parentElement.classList.add('missing')">` : ''}
      <div class="ph-inner">
        <span class="ph-top">${cap}</span>
        <span class="ph-bottom">[ AWAITING ASSET ]</span>
      </div>
      ${overlayCaption && fig ? `<div class="caption-overlay">${cap}</div>` : ''}
    </div>`;
  const caption = (!overlayCaption && fig)
    ? `<figcaption class="fig-caption"><span>${cap}</span><span class="ctx">${ctx}</span></figcaption>`
    : '';
  return `<figure class="fig-card">${media}${caption}</figure>`;
}

function metaTable(rows) {
  return `<div class="meta-table">${rows.map(([k, v]) =>
    `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}</div>`;
}

/* ---------- scroll reveal ---------- */
let revealObserver = null;
function initReveal() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        revealObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach((el, i) => {
    // stagger grid children 80ms each
    const parent = el.parentElement;
    if (parent && parent.dataset.stagger !== undefined) {
      const idx = Array.from(parent.children).indexOf(el);
      el.style.transitionDelay = `${idx * 80}ms`;
    }
    revealObserver.observe(el);
  });
}

/* ---------- scroll progress (case studies) ---------- */
function initScrollProgress() {
  const bar = document.querySelector('.scroll-progress .bar');
  if (!bar) return;
  const onScroll = () => {
    const h = document.documentElement;
    const max = h.scrollHeight - h.clientHeight;
    bar.style.width = max > 0 ? `${(h.scrollTop / max) * 100}%` : '0%';
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

/* ---------- render ---------- */
function render() {
  const view = routeFromPath();
  const fn = VIEWS[view] || VIEWS.home;
  document.getElementById('app').innerHTML = fn();
  bindNav();
  initReveal();
  initScrollProgress();
}

function bindNav() {
  document.querySelectorAll('a[data-nav]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      navigate(a.dataset.nav);
    });
  });
  document.querySelectorAll('[data-navcard]').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.navcard));
  });
  const burger = document.getElementById('hamburgerBtn');
  const overlay = document.getElementById('mobileOverlay');
  if (burger && overlay) {
    burger.addEventListener('click', () => overlay.classList.add('open'));
    overlay.querySelector('.close-btn').addEventListener('click', () => overlay.classList.remove('open'));
    overlay.querySelectorAll('a[data-nav]').forEach(a =>
      a.addEventListener('click', () => overlay.classList.remove('open')));
  }
}

/* ============================================================
   HOME VIEW
   ============================================================ */
VIEWS.home = function () {
  const cards = [

      path: '/ergodeck', img: 'fig-ergodeck-hero.jpg', name: 'ErgoDeck', year: '2026',
      cat: 'CAPSTONE · AUTOMOTIVE',
      desc: 'Professional grade ergonomic creeper for home mechanics.',
    },
    {
      path: '/welded-stool', img: 'welded-stool-cover.jpg', name: 'Welded Stool', year: '2024',
      cat: 'FABRICATION · FURNITURE',
      desc: 'MIG welded A513 steel tubing.',
    },
    {
      path: '/thermowave', img: 'thermo-hero.png', name: 'ThermoWave', year: '2025',
      cat: 'CULINARY · APPLIANCE',
      desc: 'Premium sous vide circulator.',
    },
    {
      path: '/kohler', img: 'kohler-hero.jpg', name: 'Kohler', year: '2025',
      cat: 'SCADPRO · KITCHEN & BATH',
      desc: 'Project Manager · SCADpro sponsored studio.',
      overlay: 'under NDA/ Brief available',
    },
    {
      path: '/skullcandy', img: 'skullcandy-cover.jpg', name: 'Skullcandy', year: '2025',
      cat: 'SCADPRO · CONSUMER ELEC.',
      desc: 'Industrial Designer · SCADpro sponsored studio.',
      overlay: 'under NDA/ Brief available',
    },
    {
      path: '/cad-renders', img: 'fig-cad-v3.png', name: 'CAD & Renders', year: '2024',
      cat: 'GALLERY · VISUALIZATION',
      desc: 'SolidWorks / Rhino / KeyShot.',
      overlay: 'UNder Constructions',
    },
  ];

  const cardHtml = c => `
    <div class="project-card reveal" data-navcard="${c.path}" role="link" tabindex="0" aria-label="${c.name}">
      <div class="card-img">
        <img src="${A(c.img)}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
        ${c.overlay ? `<div class="nda-banner">${c.overlay}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="title-row"><span class="name">${c.name}</span><span class="year">${c.year}</span></div>
        <div class="cat">${c.cat}</div>
        <div class="descriptor">${c.desc}</div>
      </div>
    </div>`;

  return `
  ${TopNav('home')}
  <main class="page">

    <!-- HERO -->
    <section style="min-height: calc(100vh - 128px); display:flex; flex-direction:column; justify-content:center; align-items:center; gap:48px; padding: 48px 0;">
      <div class="f-mono reveal" style="font-size:clamp(12px,1.6vw,24px); color:var(--accent); letter-spacing:2.52px; text-transform:uppercase; text-align:center;">
        SCAD INDUSTRIAL DESIGN · '26
      </div>
      <h1 class="f-serif reveal" style="font-style:italic; font-size:clamp(64px,11vw,150px); line-height:0.95; color:var(--accent); text-align:center;">
        Portfolio
      </h1>
      <div class="panel reveal grid-collapse" style="display:grid; grid-template-columns:1fr 1fr 1fr; width:100%; max-width:1240px;">
        <div style="padding:32px; border-right:1px solid var(--border);">
          <div class="f-mono" style="font-size:14px; color:var(--t3);">Discipline</div>
          <div class="f-mono" style="font-size:14px; color:var(--t1); letter-spacing:2.24px; margin-top:12px;">Ergonomics · DFM · Fabrication</div>
        </div>
        <div style="padding:32px; border-right:1px solid var(--border);">
          <div class="f-mono" style="font-size:14px; color:var(--t3);">Depth</div>
          <div class="f-mono" style="font-size:14px; color:var(--t1); letter-spacing:2.24px; margin-top:12px;">Shop · CAD · Field · Weld</div>
        </div>
        <div style="padding:32px;">
          <div class="f-mono" style="font-size:14px; color:var(--t3);">Projects</div>
          <div class="f-mono" style="font-size:14px; color:var(--t1); letter-spacing:2.24px; margin-top:12px;">06 Index · 03 Live · 02 NDA</div>
        </div>
      </div>
      <div class="f-mono reveal" style="font-size:clamp(12px,1.6vw,24px); color:var(--accent); letter-spacing:3.36px; text-transform:uppercase; text-align:center;">
        Available for hire
      </div>
    </section>

    <!-- PROJECT INDEX -->
    <section class="section-block">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; margin-bottom:36px;">

          ${secLabel('01', 'WORK')}

        <div class="f-mono" style="font-size:10px; color:var(--t2); letter-spacing:2px;">06 PROJECTS · 03 LIVE · 02 NDA</div>
      </div>
      <div class="grid-collapse" data-stagger style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px;">
        ${cards.map(cardHtml).join('')}
      </div>
    </section>

  </main>
  ${Footer()}`;
};

// Mobile responsiveness note: hero grid + project grid collapse via .grid-collapse

/* boot after all view files load */
window.addEventListener('DOMContentLoaded', render);
</script>

<script src="pages-view.js"></script>
<script src="ergodeck-view.js"></script>
<script src="thermowave-view.js"></script>
<script src="weldedstool-view.js"></script>

</body>
</html>
