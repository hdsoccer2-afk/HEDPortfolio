function navigate(view) {

function observeFades() {
  const els = document.querySelectorAll('.fade-up');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  els.forEach(el => obs.observe(el));
}

  // ---- Trigger button ----
  const btn = document.createElement('button');
  btn.id = 'img-tool-btn';
  btn.type = 'button';
  btn.innerHTML = '⊡ IMG TOOL';
  document.body.appendChild(btn);

  // ---- Toast ----
  const toast = document.createElement('div');
  toast.id = 'img-tool-toast';
  document.body.appendChild(toast);
  let toastTimer = null;
  function showToast(msg, isErr) {
    toast.textContent = msg;
    toast.classList.toggle('err', !!isErr);
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
  }

  // ---- Per-slot state (survives re-render via WeakMap) ----
  let panel = null;
  let activeSlot = null;
  const slotState = new WeakMap();

  function getState(slot) {
    let s = slotState.get(slot);
    if (!s) { s = { posX: 50, posY: 50, zoom: 1, shrink: 1 }; slotState.set(slot, s); }
    if (typeof s.shrink !== 'number') s.shrink = 1;
    return s;
  }

  function applyState(slot) {
    const s = getState(slot);
    const img = slot.querySelector('img');
    if (img) {
      img.style.objectFit = img.style.objectFit || 'cover';
      const pct = Math.max(0.2, Math.min(1, s.shrink)) * 100;
      const off = (100 - pct) / 2;
      img.style.width = pct + '%';
      img.style.height = pct + '%';
      img.style.top = off + '%';
      img.style.left = off + '%';
      img.style.right = 'auto';
      img.style.bottom = 'auto';
      img.style.objectPosition = `${s.posX}% ${s.posY}%`;
      img.style.transform = `scale(${s.zoom})`;
      img.style.transformOrigin = 'center center';
    }
  }

  function parseExistingFraming(slot) {
    const img = slot.querySelector('img');
    const s = getState(slot);
    if (!img) return s;
    // Parse object-position
    const op = img.style.objectPosition || '';
    const mOp = op.match(/(\d+(?:\.\d+)?)%\s+(\d+(?:\.\d+)?)%/);
    if (mOp) { s.posX = +mOp[1]; s.posY = +mOp[2]; }
    // Parse transform: scale(...)
    const tr = img.style.transform || '';
    const mTr = tr.match(/scale\(\s*(\d+(?:\.\d+)?)\s*\)/);
    if (mTr) { s.zoom = Math.min(3, Math.max(1, +mTr[1])); }
    // Parse width% (shrink factor)
    const w = img.style.width || '';
    const mW = w.match(/(\d+(?:\.\d+)?)%/);
    if (mW) { s.shrink = Math.min(1, Math.max(0.2, +mW[1] / 100)); }
    return s;
  }

  function slotLabel(slot) {
    const parent = slot.parentElement;
    const cap = parent ? parent.querySelector('.fig-caption .fig-num') : null;
    if (cap) {
      return cap.parentElement.textContent.trim().replace(/\s+/g, ' ').toUpperCase();
    }
    const img = slot.querySelector('img');
    if (img && img.alt) return img.alt.toUpperCase();
    return 'IMAGE SLOT';
  }

  function closePanel() {
    if (panel) { panel.remove(); panel = null; }
    if (activeSlot) { activeSlot.classList.remove('img-tool-selected'); activeSlot = null; }
  }

  // Fill slider track from 0 → thumb in brass
  function fillTrack(input, min, max) {
    const pct = ((+input.value - min) / (max - min)) * 100;
    input.style.background = `linear-gradient(to right, ${ACCENT} 0%, ${ACCENT} ${pct}%, ${SURFACE} ${pct}%, ${SURFACE} 100%)`;
  }

  function openPanel(slot) {
    closePanel();
    activeSlot = slot;
    slot.classList.add('img-tool-selected');

    // Reconcile session state with any currently-applied inline framing
    parseExistingFraming(slot);
    const s = getState(slot);
    const label = slotLabel(slot);

    panel = document.createElement('div');
    panel.id = 'img-tool-panel';
    panel.innerHTML = `
      <div class="it-header">${label}</div>

      <div class="it-section">
        <div class="it-label">Image source</div>
        <label class="it-btn" style="display:inline-block;">
          ⬆ Upload image
          <input type="file" accept="image/*" id="it-file" style="display:none;">
        </label>
        <div class="it-hint">Session only · Export CSS to persist</div>
      </div>

      <div class="it-section">
        <div class="it-slider-block">
          <div class="it-slider-label-row">
            <div class="it-label" style="margin-bottom:0;">Pan X</div>
            <div class="it-readout" id="it-x-readout">${s.posX}%</div>
          </div>
          <input type="range" class="it-range" id="it-x" min="0" max="100" step="1" value="${s.posX}">
        </div>
        <div class="it-slider-block">
          <div class="it-slider-label-row">
            <div class="it-label" style="margin-bottom:0;">Pan Y</div>
            <div class="it-readout" id="it-y-readout">${s.posY}%</div>
          </div>
          <input type="range" class="it-range" id="it-y" min="0" max="100" step="1" value="${s.posY}">
        </div>
        <div class="it-slider-block">
          <div class="it-slider-label-row">
            <div class="it-label" style="margin-bottom:0;">Zoom</div>
            <div class="it-readout" id="it-z-readout">${s.zoom.toFixed(2)}×</div>
          </div>
          <input type="range" class="it-range" id="it-z" min="1" max="3" step="0.01" value="${s.zoom.toFixed(2)}">
        </div>
        <div class="it-slider-block">
          <div class="it-slider-label-row">
            <div class="it-label" style="margin-bottom:0;">Shrink</div>
            <div class="it-readout" id="it-s-readout">${Math.round(s.shrink*100)}%</div>
          </div>
          <input type="range" class="it-range" id="it-s" min="0.2" max="1" step="0.01" value="${s.shrink.toFixed(2)}">
        </div>
      </div>

      <div class="it-section">
        <div class="it-action-row">
          <button class="it-btn" data-act="reset">↺ Reset</button>
          <button class="it-btn brass" data-act="copy">⧉ Copy CSS</button>
          <button class="it-btn" data-act="close">✕ Close</button>
        </div>
      </div>
    `;
    document.body.appendChild(panel);

    // Position (document coords; anchor to slot's top-right, clamp on-screen)
    const rect = slot.getBoundingClientRect();
    const top = rect.top + window.scrollY;
    const left = rect.right + window.scrollX + 12;
    const maxLeft = document.documentElement.scrollWidth - 260 - 16;
    panel.style.top = top + 'px';
    panel.style.left = Math.min(Math.max(8, left), Math.max(8, maxLeft)) + 'px';

    const xInput = panel.querySelector('#it-x');
    const yInput = panel.querySelector('#it-y');
    const zInput = panel.querySelector('#it-z');
    const sInput = panel.querySelector('#it-s');
    const xRead  = panel.querySelector('#it-x-readout');
    const yRead  = panel.querySelector('#it-y-readout');
    const zRead  = panel.querySelector('#it-z-readout');
    const sRead  = panel.querySelector('#it-s-readout');

    // Initial track fills
    fillTrack(xInput, 0, 100);
    fillTrack(yInput, 0, 100);
    fillTrack(zInput, 1, 3);
    fillTrack(sInput, 0.2, 1);

    xInput.addEventListener('input', () => {
      s.posX = +xInput.value;
      xRead.textContent = `${s.posX}%`;
      fillTrack(xInput, 0, 100);
      applyState(slot);
    });
    yInput.addEventListener('input', () => {
      s.posY = +yInput.value;
      yRead.textContent = `${s.posY}%`;
      fillTrack(yInput, 0, 100);
      applyState(slot);
    });
    zInput.addEventListener('input', () => {
      s.zoom = +(+zInput.value).toFixed(2);
      zRead.textContent = `${s.zoom.toFixed(2)}×`;
      fillTrack(zInput, 1, 3);
      applyState(slot);
    });
    sInput.addEventListener('input', () => {
      s.shrink = +(+sInput.value).toFixed(2);
      sRead.textContent = `${Math.round(s.shrink*100)}%`;
      fillTrack(sInput, 0.2, 1);
      applyState(slot);
    });

    // File upload
    panel.querySelector('#it-file').addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      if (!f.type.startsWith('image/')) { showToast('Invalid file', true); return; }
      const reader = new FileReader();
      reader.onload = (ev) => {
        let img = slot.querySelector('img');
        if (!img) {
          slot.innerHTML = '';
          img = document.createElement('img');
          img.alt = label;
          slot.appendChild(img);
        }
        img.src = ev.target.result;
        applyState(slot);
        showToast('Uploaded ✓');
      };
      reader.onerror = () => showToast('Invalid file', true);
      reader.readAsDataURL(f);
    });

    // Action buttons
    panel.querySelectorAll('[data-act]').forEach(b => {
      b.addEventListener('click', async () => {
        const act = b.getAttribute('data-act');
        if (act === 'reset') {
          s.posX = 50; s.posY = 50; s.zoom = 1; s.shrink = 1;
          xInput.value = 50; yInput.value = 50; zInput.value = 1; sInput.value = 1;
          xRead.textContent = '50%'; yRead.textContent = '50%'; zRead.textContent = '1.00×'; sRead.textContent = '100%';
          fillTrack(xInput, 0, 100); fillTrack(yInput, 0, 100); fillTrack(zInput, 1, 3); fillTrack(sInput, 0.2, 1);
          applyState(slot);
        } else if (act === 'copy') {
          const sizePct = Math.round(s.shrink*100);
          const offPct = (100 - sizePct) / 2;
          const css = `/* ${label} — framing */\nwidth: ${sizePct}%;\nheight: ${sizePct}%;\ntop: ${offPct}%;\nleft: ${offPct}%;\nobject-position: ${s.posX}% ${s.posY}%;\ntransform: scale(${s.zoom.toFixed(2)});\n`;
          try {
            await navigator.clipboard.writeText(css);
            showToast('Copied ✓');
          } catch (err) {
            showToast('Copy failed', true);
          }
        } else if (act === 'close') {
          closePanel();
        }
      });
    });
  }

  // ---- Slot click binding ----
  function onSlotClick(e) {
    if (!document.body.classList.contains('img-tool-on')) return;
    const slot = e.currentTarget;
    e.preventDefault();
    e.stopPropagation();
    if (activeSlot === slot) { closePanel(); return; }
    openPanel(slot);
  }

  window.initImgTool = function () {
    const view = (typeof state !== 'undefined' && state && state.view) || '';
    const inCase = CASE_VIEWS.indexOf(view) !== -1;
    syncBtnVisibility();
    if (!(editModeActive && inCase)) return;
    document.querySelectorAll('.img-slot').forEach(slot => {
      if (slot.__imgToolBound) return;
      slot.__imgToolBound = true;
      slot.addEventListener('click', onSlotClick);
      applyState(slot);
    });
  };

  // Toggle button
  btn.addEventListener('click', () => {
    const on = document.body.classList.toggle('img-tool-on');
    btn.innerHTML = on ? '⊡ IMG TOOL' : '⊡ IMG TOOL';
    if (!on) closePanel();
  });

  // Escape: close panel; if already closed, exit tool mode
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (panel) { closePanel(); return; }
    if (document.body.classList.contains('img-tool-on')) {
      document.body.classList.remove('img-tool-on');
      btn.innerHTML = '⊡ IMG TOOL';
    }
  });

  // Click outside panel / slot closes panel
  document.addEventListener('click', (e) => {
    if (!panel) return;
    if (panel.contains(e.target)) return;
    if (e.target.closest && e.target.closest('.img-slot')) return;
    closePanel();
  });

  // First-run init if render already fired
  if (document.readyState !== 'loading') {
    setTimeout(() => { if (typeof initImgTool === 'function') initImgTool(); }, 0);
  }
})();


</script>

<script src="ergodeck-view.js"></script>
</body>
